apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-webapp

  template:
    metadata:
      labels:
        app: simple-webapp

    spec:
      containers:
        - name: simple-webapp
          image: simple-webapp:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000

          env:
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: mongo-root-username

            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: mongo-root-password

            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: mongo-database

            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: mongo-host

            - name: MONGO_PORT
              valueFrom:
                configMapKeyRef:
                  name: mongo-config
                  key: mongo-port